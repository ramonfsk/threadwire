name: Bug report
description: Report a problem with Threadwire
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Threadwire is still early — check the [roadmap](https://github.com/ramonfsk/threadwire#roadmap) to confirm the affected milestone is actually implemented yet.
  - type: input
    id: platform
    attributes:
      label: Platform
      description: iOS, Android, or both? Include OS version.
      placeholder: iOS 17 / Android 14
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Threadwire version / commit
      placeholder: v0.1.0 or commit SHA
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / stack trace
      render: shell
    validations:
      required: false
